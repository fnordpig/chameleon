name: release

# Two trigger surfaces:
#   * workflow_dispatch — manual smoke build of any ref. Runs the four
#     gates and uploads dist artifacts. Does NOT publish.
#   * push of a v*.*.* tag — runs the same gates + build, then publishes
#     to PyPI via OIDC trusted publishing (no long-lived API token in
#     repo secrets). Requires the operator to have configured a Trusted
#     Publisher for this repo at https://pypi.org/manage/account/publishing/.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (defaults to the workflow's checkout)"
        required: false
        default: ""
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (gates + wheel + sdist)
    runs-on: ubuntu-latest
    steps:
      # Pinning discipline mirrors .github/workflows/ci.yml: every
      # third-party action is pinned to its full commit SHA, with a
      # trailing comment naming the human-readable version that
      # dependabot/renovate use to bump.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Sync dependencies (frozen)
        # --frozen requires uv.lock to be in sync with pyproject.toml.
        # A release should never be cut from a branch with a stale lock.
        run: uv sync --frozen

      # The four verification gates from AGENTS.md / CLAUDE.md. A
      # release MUST NOT be cut from a SHA where any of these fails.
      - name: ruff check
        run: uv run ruff check

      - name: ruff format --check
        run: uv run ruff format --check

      - name: ty check
        run: uv run ty check

      - name: pytest
        run: uv run pytest -v

      - name: Build wheel and sdist
        # `uv build` writes both formats into ./dist/ by default.
        # Hatchling reads __version__ from src/chameleon/__init__.py
        # via [tool.hatch.version], so the wheel/sdist version comes
        # from whatever SHA we just checked out.
        run: uv build

      - name: Show built artifacts
        run: ls -la dist/

      - name: Upload dist artifacts
        # upload-artifact's v4 floating tag and v4.6.2 currently point
        # to the same commit; pinning the SHA here so a future v4
        # retag can't silently shift the action under us.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 30

  publish:
    name: publish to PyPI
    # Only run on tag push, never on manual workflow_dispatch — manual
    # builds are smoke tests, not releases. The build job's gates have
    # already run; this job only fires if everything passed.
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # OIDC-based Trusted Publishing: PyPI exchanges the workflow's OIDC
    # token for a short-lived API token. No PYPI_API_TOKEN secret needed
    # in the repo. Configure once at PyPI under "Publishing" → add a
    # Trusted Publisher with workflow=release.yml, repo=fnordpig/chameleon.
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/chameleon
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # pypa/gh-action-pypi-publish handles the OIDC dance + upload.
        # Pinned to the v1.14.0 commit; bump via dependabot when a new
        # release lands.
        uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d  # v1.14.0
