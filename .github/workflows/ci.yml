name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    # Runs the same four verification gates that AGENTS.md requires for
    # any commit: ruff check, ruff format --check, ty check, pytest.
    # Matrix covers the supported Python range on both Linux and macOS.
    # We deliberately do NOT exercise tools/sync-schemas/ in CI — that
    # path requires network + a Rust toolchain and is operator-run on
    # demand, not per-commit.
    name: gates (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python }}

      - name: Sync dependencies (frozen)
        # --frozen requires uv.lock to be in sync with pyproject.toml.
        # If a PR forgot to regenerate the lock, CI fails here clearly.
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check

      - name: ruff format --check
        run: uv run ruff format --check

      - name: ty check
        run: uv run ty check

      - name: pytest
        run: uv run pytest -v
