name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    # Runs the same four verification gates that AGENTS.md requires for
    # any commit: ruff check, ruff format --check, ty check, pytest.
    # Matrix covers the supported Python range on both Linux and macOS.
    # We deliberately do NOT exercise tools/sync-schemas/ in CI — that
    # path requires network + a Rust toolchain and is operator-run on
    # demand, not per-commit.
    name: gates (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      # Both actions are SHA-pinned per supply-chain hygiene. setup-uv v8+
      # stopped publishing floating major tags after the tj-actions
      # incident; the SHA is the only durable reference. The trailing
      # comment names the human-readable version dependabot/renovate
      # use to bump.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python }}

      - name: Sync dependencies (frozen)
        # --frozen requires uv.lock to be in sync with pyproject.toml.
        # If a PR forgot to regenerate the lock, CI fails here clearly.
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check

      - name: ruff format --check
        run: uv run ruff format --check

      - name: ty check
        run: uv run ty check

      - name: pytest
        run: uv run pytest -v
